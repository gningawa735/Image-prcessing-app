image: registry.u-bordeaux.fr/pdl/jdk-mvn-node:latest

variables:
  MAVEN_CLI_OPTS: "--batch-mode"
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"
  TESTCONTAINERS_HOST_OVERRIDE: "host.docker.internal"
  POSTGRES_DB: pdl
  POSTGRES_USER: pdl
  POSTGRES_PASSWORD: pdl
  SPRING_DATASOURCE_URL: jdbc:postgres://postgres:5432/pdl
  SPRING_DATASOURCE_USERNAME: pdl
  SPRING_DATASOURCE_PASSWORD: pdl

cache:
  paths:
    - .m2/repository/
    - frontend/node_modules/

build_job:
  stage: build
  script:
    - cd backend
    - mvn $MAVEN_CLI_OPTS compile
  artifacts:
    expire_in: 10 min
    paths: 
      - target/
      - "*/target"
  tags:
      - Docker
      - Quirrel

test_job:
  stage: test
  script:
    - cd backend
    - find . -name "*.class" -exec touch {} \+
    - mvn $MAVEN_CLI_OPTS test
  tags:
      - Docker
      - Quirrel
