spring:
  application:
    name: backend
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: "jdbc:postgresql://${HOST_NAME}:5432/${DATABASE_NAME}"
    username: ${DATABASE_NAME}
    password: ${DATABASE_PASSWORD}
  servlet:
    multipart:
      max-file-size: -1
      max-request-size: -1
server:
  port: 8181
